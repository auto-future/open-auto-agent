<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工具治理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/ai-tool-governance.css">
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">⚡</div>
                <div class="sidebar-logo-text">AI工具治理</div>
            </div>
        </div>
        
        <nav class="sidebar-menu">
            <button class="sidebar-item active" data-page="dashboard" onclick="switchPage('dashboard')">
                <span class="sidebar-item-icon">📊</span>
                <span class="sidebar-item-text">总览面板</span>
            </button>
            <button class="sidebar-item" data-page="sets" onclick="switchPage('sets')">
                <span class="sidebar-item-icon">📦</span>
                <span class="sidebar-item-text">工具集管理</span>
            </button>
            <button class="sidebar-item" data-page="tools" onclick="switchPage('tools')">
                <span class="sidebar-item-icon">🔧</span>
                <span class="sidebar-item-text">工具管理</span>
            </button>
            <button class="sidebar-item" data-page="models" onclick="switchPage('models')">
                <span class="sidebar-item-icon">🤖</span>
                <span class="sidebar-item-text">大模型管理</span>
            </button>
            <button class="sidebar-item" data-page="ai-assistant" onclick="switchPage('ai-assistant')">
                <span class="sidebar-item-icon">✨</span>
                <span class="sidebar-item-text">智能工具测试</span>
            </button>
        </nav>
        
        <div class="sidebar-toggle" onclick="toggleSidebar()">
            <span id="toggleIcon">◀</span>
        </div>
    </aside>

    <!-- 主内容区 -->
    <div class="main-wrapper" id="mainWrapper">
        <!-- 顶部栏 -->
        <header class="top-header">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item">首页</li>
                    <li class="breadcrumb-item active" id="pageTitle">总览面板</li>
                </ol>
            </nav>
            <div class="header-actions">
                <button class="header-action-btn" onclick="refreshCurrentPage()" title="刷新">
                    🔄
                </button>
                <div class="user-info">
                    <div class="user-avatar">A</div>
                    <span>管理员</span>
                </div>
            </div>
        </header>

        <!-- 页面内容 -->
        <main class="content">
            <!-- 总览面板 -->
            <section class="page-section active" id="page-dashboard">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="mb-1">总览面板</h4>
                        <p class="text-muted mb-0">平台整体运行状态与监控</p>
                    </div>
                </div>
                
                <div class="row g-3 mb-4">
                    <div class="col-md-6 col-xl-3">
                        <div class="card stat-card h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="stat-icon blue">📦</div>
                                <div>
                                    <h3 class="mb-0 fw-bold" id="dashTotalSets">0</h3>
                                    <small class="text-muted">工具集总数</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <div class="card stat-card h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="stat-icon green">🔧</div>
                                <div>
                                    <h3 class="mb-0 fw-bold" id="dashTotalTools">0</h3>
                                    <small class="text-muted">工具总数</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <div class="card stat-card h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="stat-icon orange">🤖</div>
                                <div>
                                    <h3 class="mb-0 fw-bold" id="dashTotalModels">0</h3>
                                    <small class="text-muted">大模型配置</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <div class="card stat-card h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="stat-icon red">📞</div>
                                <div>
                                    <h3 class="mb-0 fw-bold" id="dashTodayCalls">0</h3>
                                    <small class="text-muted">今日调用</small>
                                    <div class="stat-change up">↑ 12.5%</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-lg-6">
                        <div class="card h-100">
                            <div class="card-header bg-white fw-semibold">📈 调用趋势</div>
                            <div class="card-body">
                                <div id="dashTrendChart" style="height: 280px;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="card h-100">
                            <div class="card-header bg-white fw-semibold">📊 工具类型分布</div>
                            <div class="card-body">
                                <div id="dashToolDistChart" style="height: 280px;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-lg-6">
                        <div class="card h-100">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                <span class="fw-semibold">📝 最近调用日志</span>
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-outline-secondary" onclick="filterDashLogs('all')">全部</button>
                                    <button class="btn btn-outline-secondary" onclick="filterDashLogs('success')">成功</button>
                                    <button class="btn btn-outline-secondary" onclick="filterDashLogs('error')">失败</button>
                                </div>
                            </div>
                            <div class="card-body" style="max-height: 360px; overflow-y: auto;">
                                <div id="dashLogsContainer"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="card h-100">
                            <div class="card-header bg-white fw-semibold">🖥️ 系统状态</div>
                            <div class="card-body">
                                <div id="dashStatusList"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 工具集管理 -->
            <section class="page-section" id="page-sets">
                <div id="setsListView">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h4 class="mb-1">工具集管理</h4>
                            <p class="text-muted mb-0">管理工具集分类，组织您的工具资源</p>
                        </div>
                        <button class="btn btn-primary" onclick="openCreateSetModal()">
                            <span>+</span> 新建工具集
                        </button>
                    </div>
                    
                    <div class="card mb-3">
                        <div class="card-body">
                            <div class="row g-2 align-items-center">
                                <div class="col-md-3 col-lg-2">
                                    <select class="form-select" id="filterSetType" onchange="filterSets()">
                                        <option value="">全部来源</option>
                                        <option value="internal">内部工具集</option>
                                        <option value="external">外部工具集</option>
                                    </select>
                                </div>
                                <div class="col-md-3 col-lg-2">
                                    <select class="form-select" id="filterSetTag" onchange="filterSets()">
                                        <option value="">全部标签</option>
                                        <option value="mcp">MCP</option>
                                        <option value="skills">Skills</option>
                                        <option value="http">HTTP</option>
                                    </select>
                                </div>
                                <div class="col-md-6 col-lg-4">
                                    <input type="text" class="form-control" id="searchSetName" placeholder="搜索工具集名称..." oninput="filterSets()">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="setsContainer" class="row g-3"></div>
                </div>
                
                <!-- 工具集详情页面 -->
                <div id="setDetailPage" style="display:none;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="d-flex align-items-center gap-3">
                            <button class="btn btn-outline-secondary" onclick="backToSetsList()">
                                ← 返回
                            </button>
                            <div>
                                <h4 class="mb-0" id="detailPageTitle"></h4>
                                <p class="text-muted mb-0 mt-1" id="detailPageSubTitle"></p>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-primary" id="detailEditBtn">编辑</button>
                            <button class="btn btn-danger" id="detailDeleteBtn">删除</button>
                        </div>
                    </div>
                    <div id="setDetailContent"></div>
                </div>
            </section>

            <!-- 工具管理 -->
            <section class="page-section" id="page-tools">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="mb-1">工具管理</h4>
                        <p class="text-muted mb-0">管理单个工具，配置参数和测试</p>
                    </div>
                </div>
                
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row g-2 align-items-center">
                            <div class="col-md-3 col-lg-2">
                                <select class="form-select" id="filterToolType">
                                    <option value="">全部类型</option>
                                    <option value="mcp">MCP</option>
                                    <option value="http">HTTP</option>
                                    <option value="skills">Skills</option>
                                </select>
                            </div>
                            <div class="col-md-3 col-lg-2">
                                <select class="form-select" id="filterToolSet">
                                    <option value="">全部工具集</option>
                                </select>
                            </div>
                            <div class="col-md-6 col-lg-4">
                                <input type="text" class="form-control" id="searchToolName" placeholder="搜索工具名称...">
                            </div>
                            <div class="col-auto ms-auto">
                                <div class="btn-group">
                                    <button class="btn btn-primary" onclick="loadTools()">🔍 搜索</button>
                                    <button class="btn btn-outline-secondary" onclick="resetToolFilters()">重置</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="toolsContainer" class="row g-3"></div>
                <div id="toolsPagination" class="d-flex justify-content-center mt-4"></div>
            </section>

            <!-- 大模型管理 -->
            <section class="page-section" id="page-models">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="mb-1">大模型管理</h4>
                        <p class="text-muted mb-0">配置和管理AI大模型，用于参数生成</p>
                    </div>
                    <button class="btn btn-primary" onclick="openCreateModelModal()">
                        <span>+</span> 添加模型
                    </button>
                </div>
                
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-md-6 col-lg-4">
                                <input type="text" class="form-control" id="searchModelName" placeholder="搜索模型名称...">
                            </div>
                        </div>
                    </div>
                </div>

                <div id="modelsContainer" class="row g-3"></div>
            </section>

            <!-- 智能工具测试 -->
            <section class="page-section" id="page-ai-assistant">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="mb-1">智能工具测试</h4>
                        <p class="text-muted mb-0">使用AI智能生成工具测试参数</p>
                    </div>
                </div>
                
                <div class="row g-3">
                    <div class="col-lg-6">
                        <div class="card h-100">
                            <div class="card-header bg-white fw-semibold">⚙️ 配置</div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label">选择大模型 <span class="text-danger">*</span></label>
                                    <select class="form-select" id="aiModelSelect">
                                        <option value="">请先配置大模型</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">JSON Schema <span class="text-danger">*</span></label>
                                    <textarea class="form-control font-monospace" id="schemaInput" rows="8" placeholder='{
  "type": "object",
  "properties": {
    "toolName": {"type": "string"},
    "method": {"type": "string", "enum": ["GET", "POST"]}
  }
}'></textarea>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">生成策略</label>
                                    <select class="form-select" id="aiStrategySelect">
                                        <option value="realistic">真实业务数据</option>
                                        <option value="boundary">边界值测试</option>
                                        <option value="comprehensive">全面覆盖</option>
                                    </select>
                                </div>

                                <button class="btn btn-primary w-100" onclick="generateParamsWithAI()">
                                    ✨ AI生成测试参数
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-6">
                        <div class="card h-100">
                            <div class="card-header bg-white fw-semibold">📊 生成结果</div>
                            <div class="card-body">
                                <div id="aiResultContainer">
                                    <div class="empty-state">
                                        <div class="empty-icon">🤖</div>
                                        <div class="empty-title">等待生成</div>
                                        <div class="empty-text">配置完成后点击生成按钮</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Bootstrap Modal -->
    <div class="modal fade" id="mainModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg" id="mainModalDialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="mainModalTitle">标题</h5>
                    <button type="button" class="btn-close" onclick="closeModal()" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="mainModalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="button" class="btn btn-primary" id="mainModalConfirm">确认</button>
                </div>
            </div>
            </div>
    </div>

    <!-- Toast -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 3000; margin-top: 64px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="/js/ai-tool-governance.js?v=20240616d"></script>
</body>
</html>
