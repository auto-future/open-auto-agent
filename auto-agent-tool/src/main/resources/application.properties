server.port=17000
spring.application.name=attack-trace-mcp-server
spring.webflux.base-path=/api

spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=attack-trace-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.protocol=sse
spring.ai.mcp.server.streamable-http.mcp-endpoint=/sse
spring.ai.mcp.server.tool-change-notification=true

tool.definition.directory=./tools

# MySQL Database Configuration
mysql.url=jdbc:mysql://10.180.9.209:43306
mysql.driver=com.mysql.cj.jdbc.Driver
mysql.username=root
mysql.password=xwXAjGe49dtU


# 分块配置
chunk.size=2000
chunk.overlap-ratio=0.1
chunk.threshold=2000
chunk.enable-overlap=true
chunk.boundary-chars=.!?;，。！？；\n\r

# 数据库配置（统一使用单个SQLite文件）
spring.datasource.url=jdbc:sqlite:./data/app.db
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.sqlite.JDBC

# SQLite原生JDBC管理器也使用同一数据库
sqlite.db.path=./data/app.db

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.format_sql=true
